<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PartyQueue 🎵</title>

  <!-- (styles unchanged, keeping yours minimal here for brevity) -->
</head>

<body>

<div id="queue-list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, collection, onSnapshot, setDoc, updateDoc, addDoc, deleteDoc, getDocs,
  serverTimestamp, increment, runTransaction 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 Firebase config (your original)
const firebaseConfig = {
  apiKey: "AIzaSyBboSmnxx3Yo0mtdVPWzNhL0EaEjWoLExg",
  authDomain: "party-queue-97670.firebaseapp.com",
  projectId: "party-queue-97670",
  storageBucket: "party-queue-97670.firebasestorage.app",
  messagingSenderId: "974203351880",
  appId: "1:974203351880:web:c9348e2f40b11992ec797d"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ======================
// 🔥 STATE (UPDATED)
// ======================
let state = {
  isHost: false,
  userName: '',
  userId: localStorage.getItem('pq_userId') || crypto.randomUUID(), // ✅ NEW
};

localStorage.setItem('pq_userId', state.userId);

// ======================
// 🔔 TOAST (simple)
// ======================
function toast(msg) {
  console.log(msg);
}

// ======================
// 🔄 REALTIME QUEUE
// ======================
onSnapshot(collection(db,'queue'), snap => {
  const songs = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b)=> (b.votes||0)-(a.votes||0));

  renderQueue(songs);
});

// ======================
// 🎨 RENDER QUEUE
// ======================
function renderQueue(songs) {
  const el = document.getElementById('queue-list');

  if (!songs.length) {
    el.innerHTML = `<p>No songs yet</p>`;
    return;
  }

  el.innerHTML = songs.map((s,i) => {
    const voted = s.voters && s.voters[state.userId];

    return `
      <div style="padding:10px; border:1px solid #333; margin:8px;">
        <strong>${i+1}. ${s.title}</strong><br/>
        <small>${s.artist}</small><br/><br/>
        
        <button onclick="vote('${s.id}')">
          ▲ ${s.votes || 0} ${voted ? '(voted)' : ''}
        </button>
      </div>
    `;
  }).join('');
}

// ======================
// 🗳️ FIXED VOTING SYSTEM
// ======================
window.vote = async function(songId) {
  const ref = doc(db, 'queue', songId);

  try {
    await runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);

      if (!snap.exists()) {
        throw new Error('not-found');
      }

      const data = snap.data();
      const voters = data.voters || {};
      const hasVoted = voters[state.userId];

      if (hasVoted) {
        delete voters[state.userId];

        transaction.update(ref, {
          votes: increment(-1),
          voters: voters
        });
      } else {
        voters[state.userId] = true;

        transaction.update(ref, {
          votes: increment(1),
          voters: voters
        });
      }
    });

  } catch (e) {
    console.error('Vote error:', e);

    if (e.message === 'not-found') {
      toast('⚠️ Song already played or removed');
    } else {
      toast('❌ Vote failed');
    }
  }
};

// ======================
// ➕ ADD SONG (TEST)
// ======================
window.addToQueue = async function(song) {
  await addDoc(collection(db,'queue'), {
    ...song,
    votes: 0,
    voters: {}, // ✅ IMPORTANT
    addedAt: serverTimestamp()
  });
};

// TEST BUTTON
window.addTestSong = function() {
  addToQueue({
    title: "Test Song",
    artist: "Test Artist"
  });
};

</script>

<button onclick="addTestSong()">Add Test Song</button>

</body>
</html>
