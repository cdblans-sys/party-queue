<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PartyQueue 🎵</title>
</head>

<body>

<div id="queue-list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, doc, collection, onSnapshot, addDoc, 
  serverTimestamp, increment, runTransaction 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG (unchanged)
const firebaseConfig = {
  apiKey: "AIzaSyBboSmnxx3Yo0mtdVPWzNhL0EaEjWoLExg",
  authDomain: "party-queue-97670.firebaseapp.com",
  projectId: "party-queue-97670",
  storageBucket: "party-queue-97670.firebasestorage.app",
  messagingSenderId: "974203351880",
  appId: "1:974203351880:web:c9348e2f40b11992ec797d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ======================
// 🔥 STATE (UPDATED)
// ======================
let state = {
  userName: '',
  userId: localStorage.getItem('pq_userId') || crypto.randomUUID(),
};

localStorage.setItem('pq_userId', state.userId);

// ======================
// 🔔 SIMPLE TOAST
// ======================
function toast(msg) {
  console.log(msg);
}

// ======================
// 🔄 REALTIME QUEUE
// ======================
onSnapshot(collection(db,'queue'), snap => {
  const songs = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b)=> (b.votes||0)-(a.votes||0));

  renderQueue(songs);
});

// ======================
// 🎨 RENDER QUEUE
// ======================
function renderQueue(songs) {
  const el = document.getElementById('queue-list');

  if (!songs.length) {
    el.innerHTML = `<p>No songs yet</p>`;
    return;
  }

  el.innerHTML = songs.map(s => {
    const voted = s.voters && s.voters[state.userId];

    return `
      <div style="margin:10px; padding:10px; border:1px solid #ccc;">
        <b>${s.title}</b> - ${s.artist}<br/>
        <button onclick="vote('${s.id}')">
          👍 ${s.votes || 0} ${voted ? '(voted)' : ''}
        </button>
      </div>
    `;
  }).join('');
}

// ======================
// 🗳️ FIXED VOTING SYSTEM
// ======================
window.vote = async function(songId) {
  const ref = doc(db, 'queue', songId);

  try {
    await runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);

      // ❌ Song no longer exists
      if (!snap.exists()) {
        throw new Error('not-found');
      }

      const data = snap.data();
      const voters = data.voters || {};
      const hasVoted = voters[state.userId];

      if (hasVoted) {
        // 🔽 REMOVE VOTE
        delete voters[state.userId];

        transaction.update(ref, {
          votes: increment(-1),
          voters: voters
        });
      } else {
        // 🔼 ADD VOTE
        voters[state.userId] = true;

        transaction.update(ref, {
          votes: increment(1),
          voters: voters
        });
      }
    });

  } catch (e) {
    console.error(e);

    if (e.message === 'not-found') {
      toast('⚠️ Song already removed or played');
    } else {
      toast('❌ Vote failed');
    }
  }
};

// ======================
// ➕ ADD SONG (TEST BUTTON)
// ======================
window.addTestSong = async function() {
  await addDoc(collection(db,'queue'), {
    title: "Test Song",
    artist: "Test Artist",
    votes: 0,
    voters: {}, // 🔥 important
    addedAt: serverTimestamp()
  });
};

</script>

<button onclick="addTestSong()">Add Test Song</button>

</body>
</html>
